name: FMM Debian Release

on:
  pull_request:
    paths:
      - '.github/workflows/fmm-deb-release.yml'
      - 'LICENSE'
      - 'core/**'
      - 'modules/fmm/**'
      - 'package.yaml'
      - 'hatsu-yakitori.cabal'
      - 'shake/**'
      - 'stack.yaml'
      - 'tests/fmm_tests.scm'
  push:
    branches:
      - main
      - feature/fmm_classroom_rpc_actions
      - 'release/**'
    tags:
      - 'fmm-v*'
      - 'v*'
    paths:
      - '.github/workflows/fmm-deb-release.yml'
      - 'LICENSE'
      - 'core/**'
      - 'modules/fmm/**'
      - 'package.yaml'
      - 'hatsu-yakitori.cabal'
      - 'shake/**'
      - 'stack.yaml'
      - 'tests/fmm_tests.scm'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    name: Build FMM .deb
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential chicken-bin dpkg-dev

      - name: Install Stack
        run: curl -sSL https://get.haskellstack.org/ | sh

      - name: Build local shake executable
        run: stack build hatsu-yakitori:exe:shake

      - name: Check packaging environment
        run: stack exec shake -- fmm-release-check-env

      - name: Build Debian package
        run: stack exec shake -- deb-fmm

      - name: Inspect packaged outputs
        run: find dist -type f | sort

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hatsu-fmm-deb
          path: |
            dist/*.deb
            dist/fmm-release/pkgroot/**
          if-no-files-found: error

  publish-release:
    name: Publish .deb to GitHub Release
    runs-on: ubuntu-latest
    needs: build-deb
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          name: hatsu-fmm-deb
          path: release-assets

      - name: Upload package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t debs < <(find release-assets -type f -name '*.deb' | sort)
          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No .deb artifact found to publish."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          gh release upload "$tag" "${debs[@]}" --clobber