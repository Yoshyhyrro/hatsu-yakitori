name: Translate README

on:
  push:
    tags-ignore:
      - '*'
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate README to Japanese
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install googletrans==4.0.0-rc1

      - name: Run translation
        run: python .github/scripts/translate_readme.py

      - name: Stage translated README
        run: |
          git add README.ja.md || true

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --cached --quiet; then
            echo "No translation changes to submit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/translate-readme-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "Auto-translate README to Japanese"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --title "Auto-translate README (ja)" \
            --body "This PR adds/updates README.ja.md generated automatically by CI." \
            --base "$GITHUB_REF_NAME" \
            --head "$BRANCH"
