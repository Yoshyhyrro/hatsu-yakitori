name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'core/**'
      - 'dist-proof/lean4/**'
      - 'modules/**'
      - 'package.yaml'
      - 'hatsu-yakitori.cabal'
      - 'shake/**'
      - 'stack.yaml'
      - 'tests/fmm_tests.scm'
  push:
    tags-ignore:
      - '*'
    paths:
      - '.github/workflows/ci.yml'
      - 'core/**'
      - 'dist-proof/lean4/**'
      - 'modules/**'
      - 'package.yaml'
      - 'hatsu-yakitori.cabal'
      - 'shake/**'
      - 'stack.yaml'
      - 'tests/fmm_tests.scm'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean-fmm-gate:
    name: Build HatsuYakitori.FMM
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: dist-proof/lean4
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch dependency cache
        run: |
          lake update
          lake exe cache get

      - name: Build FMM proof gate
        run: lake build HatsuYakitori.FMM

      - name: Build HopfStructure proof target
        run: lake build HatsuYakitori.HopfStructure

  fmm-runtime-smoke:
    name: Run FMM Scheme smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install CHICKEN
        run: |
          sudo apt-get update
          sudo apt-get install -y chicken-bin

      - name: Install CHICKEN egg dependencies
        run: sudo chicken-install srfi-1 srfi-69

      - name: Verify CHICKEN toolchain
        run: |
          which csc
          csc -version
          chicken-status srfi-1 srfi-69

      - name: Run FMM smoke test
        run: csi -s tests/fmm_tests.scm

