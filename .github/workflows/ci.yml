name: Translate README

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate README to Japanese
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install googletrans==4.0.0-rc1

      - name: Run translation
        run: python .github/scripts/translate_readme.py

      - name: Stage translated README
        run: |
          git add README.ja.md || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-translate README to Japanese"
          title: "Auto-translate README (ja)"
          body: "This PR adds/updates README.ja.md generated automatically by CI."
          base: ${{ github.ref_name }}
          branch: "auto/translate-readme-${{ github.run_id }}"
